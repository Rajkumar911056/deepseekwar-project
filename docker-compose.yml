version: '3.8'

services:
  tomcat:
    build: .
    container_name: tomcat-devops-demo
    ports:
      - "8080:8080"
    environment:
      - CATALINA_OPTS=-Xmx512m
    volumes:
      - tomcat-logs:/usr/local/tomcat/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  tomcat-logs:
