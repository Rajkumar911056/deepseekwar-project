apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-devops-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-devops-demo
  template:
    metadata:
      labels:
        app: java-devops-demo
    spec:
      containers:
      - name: tomcat
        image: your-dockerhub/java-devops-demo:latest
        ports:
        - containerPort: 8080
        env:
        - name: CATALINA_OPTS
          value: "-Xmx512m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: java-devops-demo
spec:
  selector:
    app: java-devops-demo
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
